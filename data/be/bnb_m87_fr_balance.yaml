name: be_bnb_m87_fr_balance
title: "BNB - Micro - Tableau des résultats"
description: Tableau des résultats comptable pour les entreprises micro sans capital, suivant la taxonomie de la BNB.

xbrl:
  schema_ref:
    type: "simple"
    arcrole: "http://www.w3.org/1999/xlink/properties/linkbase"
    href: "http://www.nbb.be/be/fr/pfs/ci/micro/pfs-mic-wc-2021-01-01.xsd"
  namespaces:
    pfs-vl: "http://www.nbb.be/be/fr/pfs/ci/vl/2021-01-01"
    pfs-gcd: "http://www.nbb.be/be/fr/pfs/ci/gcd/2021-01-01"
    pfs: "http://www.nbb.be/be/fr/pfs/ci/2021-01-01"
    iso4217: "http://www.xbrl.org/2003/iso4217"
  entity_scheme: "http://www.fgov.be"
  units:
    - {"id": "U-Pure", "measure":"xbrli:pure"}
    - {"id": "U-Shares", "measure":"xbrli:shares"}
    - {"id": "EUR", "measure":"iso4217:EUR"}

sections:
- name: Actif
  sections:
  - name: "Frais d'établissement"
    code: 20
  - name: "Actifs immobilisés"
    code: 21/28
    sections:
    - name: Immobilisations incorporelles
      code: 21
      annexe: 6.1.1
    - name: Immobilisations corporelles
      code: 22/27
      annexe: 6.1.2
      sections:
      - name: Terrains et constructions
        code: 22
      - name: Installations, machines et outillage
        code: 23
      - name: Mobilier et matériel roulant
        code: 24
      - name: Location-financement et droits similaires
        code: 25
      - name: Autres immobilisations corporelles
        code: 26
      - name: Immobilisations en cours et acomptes versés
        code: 27
    - name: Immobilisations financières
      code: 28
      annexe: 6.1.3
  - name: "Actifs circulants"
    code: 29/58
    sections:
      - name: "Créances à plus d'un an"
        code: 29
        sections:
        - name: Créances commerciales
          code: 290
        - name: Autres créances
          code: 291
      - name: "Stocks et commandes en cours d'exécution"
        code: 3
        sections:
        - name: Stocks
          code: 30/36
        - name: "Commandes en cours d'exécution"
          code: 37
      - name: Créances à un an au plus
        code: 40/41
        sections:
        - name: Créances commerciales
          code: 40
        - name: Autres créances
          code: 41
      - name: Placements de trésorerie
        code: 50/53
      - name: Valeurs disponibles
        code: 54/58
      - name: Comptes de régularisation
        code: 490/1
  - name: "Total de l'actif"
    code: 20/58
    formula: "`2/3` + `40/1` + `490/1` + `5`"
- name: Passif
  sections:
  - name: Capitaux Propres
    code: 10/15
    sections:
    - name: Apport
      code: 10/11
      sections:
      - name: Disponible
        code: 110
        # note: apport = capital appelé
        formula: "`100`"
      - name: Indisponible
        code: 111
        formula: "`101`"
    - name: Plus-values de réévaluation
      code: 12
    - name: Réserves
      code: 13
      sections:
      - name: Réserves indisponibles
        code: 130/1
        sections:
        - name: Réserves statutairement indisponibles
          code: 1311
        - name: "Acquisition d'actions propres"
          code: 1312
        - name: Soutien financier
          code: 1313
        - name: Autres
          code: 1319
      - name: Réserves immunisées
        code: 132
      - name: Réserves disponibles
        code: 133
    - name: Bénéfice (Perte) reporté(e) (+)/(-)
      code: 14
    - name: Subsides en capital
      code: 15
    - name: "Avance aux associés sur la répartition de l'actif net"
      code: 19
  - name: Provisions et impôts différés
    code: 16
    sections:
    - name: Provisions pour risques et charges
      code: 160/5
      sections:
      - name: Pensions et obligations similaires
        code: 160
      - name: Charges fiscales
        code: 161
      - name: Grosses réparations et gros entretien
        code: 162
      - name: Obligations environnementales
        code: 163
      - name: Autres risques et charges
        code: 164/5
    - name: Impôts différés
      code: 168
  - name: Dettes
    code: 17/49
    sections:
    - name: "Dettes à plus d'un an"
      code: 17
      sections:
      - name: Dettes financières
        code: 170/4
        sections:
        - name: Établissements de crédit, dettes de location-financement et dettes assimilées
          code: 172/3
        - name: Autres emprunts
          code: 174/0
      - name: Dettes commerciales
        code: 175
      - name: Acomptes sur commandes
        code: 176
      - name: Autres dettes
        code: 178/9
    - name: "Dettes à plus d'un an"
      code: 42/48
      sections:
      - name: "Dettes à plus d'un an échéant dans l'année"
        code: 42
      - name: Dettes financières
        code: 43
        sections:
        - name: Établissements de crédit
          code: 430/8
        - name: Autres emprunts
          code: 439
      - name: Dettes commerciales
        code: 44
        sections:
        - name: Fournisseurs
          code: 440/4
        - name: Effets à payer
          code: 441
      - name: Acomptes sur commandes
        code: 46
      - name: Dettes fiscales, salariales et sociales
        code: 45
        sections:
        - name: Impôts
          code: 450/3
        - name: Rémunérations et charges sociales
          code: 454/9
      - name: Autres dettes
        code: 47/48
    - name: Comptes de régularisation
      code: 492/3
  - name: Total du passif
    code: 10/49
    formula: "`1` + `42/48` + `492/3`"
- name: Comptes de résultats
  sections:
  - name: "Produits et charges d'exploitation"
    sections:
    - name: Marge brute (+)/(-)
      code: 9900
      sections:
      - name: "Dont: produits d'exploitation non récurrents"
        code: 76A
      - name: "Chiffre d'affaires"
        code: 70
      # - name: ? En-cours de fabrication, produits finis & commands en cours d'exécution: augmentation (réduction) (+)/(-)
      #   code: 71
      # - name: Production Immobilisée
      #   code: 72
      # - name: Autres produits d'exploitation
      #   code: 74
      #   annexe: "6.10"
      - name: Approvisionnements, marchandises, services et biens divers
        code: 60/61
        weight: -1
    - name: Rémunérations, charges sociales et pensions (+)/(-)
      code: 62
      weight: -1
    - name: "Amortissements et réductions de valeur sur frais d'établissement, sur immobilisations incorporelles et corporelles"
      code: 630
      weight: -1
    - name: "Réductions de valeur sur stocks, sur commandes en cours d'exécution et sur créances commerciales: dotations (reprises) (+)/(-)"
      code: 631/4
      weight: -1
    - name: "Provisions pour risques et charges: dotations (utilisations et reprises) (+)/(-)"
      code: 635/8
      weight: -1
    - name: "Autres charges d'exploitation"
      code: 640/8
      weight: -1
    - name: "Charges d'exploitation portées à l'actif au titre de frais de restructuration (-)"
      code: 649
      weight: -1
    - name: "Charges d’exploitation non récurrentes"
      code: 66A
      weight: -1
  - name: "Bénéfice (Perte) d'exploitation"
    code: 9901
    formula: "`9900` - `62` - `630` - `631/4` - `635/8` - `640/8` - `649`- `66A`"
  - name: Produits financiers
    code: 75/76B
    sections:
    - name: Produits financiers récurrents
      code: 75
      formula: "`#75`"
      sections:
      - name: "Dont: subsides en capital et en intérêts"
        code: 753
    - name: Produits financiers non récurrents
      code: 76B
      formula: "`#76`"
  - name: Charges financières
    code: 65/66B
    weight: -1
    sections:
    - name: Charges financières récurrentes
      code: 65
    - name: Charges financières non récurrentes
      code: 66B
  - name: "Bénéfice (Perte) de l'exercice avant impôts (+)/(-)"
    code: 9903
    formula: "`9901` + `75/76B` - `65/66B`"
  - name: Prélèvement sur les impôts différés
    code: 780
  - name: Transfert aux impôts différés
    code: 680
  - name: Impôts sur le résultat (+)/(-)
    code: 67/77
    formula: "`670/3` - `77`"
  - name: "Bénéfice (Perte) de l'exercice (+)/(-)"
    code: 9904
    formula: "`9903` + `780` - `680` - `67`"
  - name: Prélèvement sur les réserves immunisées
    code: 789
  - name: Transfert aux réserves immunisées
    code: 689
  - name: "Bénéfice (Perte) de l'exercice à affecter (+)/(-)"
    code: 9905
    formula: "`9904` + `789` - `689`"
