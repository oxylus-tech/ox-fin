# Invoice OUT
- model: ox_fin.moverule
  pk: 1
  fields:
    name: Invoice/OUT - Sent
    description: Invoice sent client
    template: 1
    journal: 1
    code: out
- model: ox_fin.linerule
  pk: 1
  fields:
    name: Product sale
    move_rule: 1
    account: 814
    code: ht
    order: 0
    formula: tt-vat21
    is_debit: false
- model: ox_fin.linerule
  pk: 2
  fields:
    name: VAT 21%
    move_rule: 1
    account: 432
    code: vat21
    order: 100
    formula: ht*0.21
    is_debit: false
- model: ox_fin.linerule
  pk: 3
  fields:
    name: Client debt
    move_rule: 1
    account: 406
    code: tt
    order: 100
    formula: ht+vat21
    is_debit: true

- model: ox_fin.moverule
  pk: 2
  fields:
    name: Invoice/OUT - Paid
    description: Client invoice paid
    template: 1
    journal: 2
    code: tx.out
- model: ox_fin.linerule
  pk: 4
  fields:
    name: Bank received money
    move_rule: 2
    account: 607
    code: tt
    order: 0
    formula: ''
    is_debit: true
- model: ox_fin.linerule
  pk: 5
  fields:
    name: Client paid
    move_rule: 2
    account: 406
    code: ''
    order: 100
    formula: tt
    is_debit: false

